<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>תיק לקוחות — ביטוח משכנתא</title>
<style>
:root {
  --bg: #f3f6f9;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --ink: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --accent: #0284c7;
  --accent-hover: #0369a1;
  --accent-soft: #e0f2fe;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
  --warn: #d97706;
  --warn-bg: #fef3c7;
  --bad: #dc2626;
  --bad-bg: #fee2e2;
  --neut: #64748b;
  --neut-bg: #f1f5f9;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --radius-md: 10px;
  --radius-lg: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --ink: #f8fafc;
    --muted: #94a3b8;
    --line: #334155;
    --accent: #38bdf8;
    --accent-hover: #7dd3fc;
    --accent-soft: #0c4a6e;
    --ok: #22c55e;
    --ok-bg: #14532d;
    --warn: #fbbf24;
    --warn-bg: #78350f;
    --bad: #ef4444;
    --bad-bg: #7f1d1d;
    --neut: #94a3b8;
    --neut-bg: #334155;
  }
}
:root[data-theme="dark"] { /* Same as prefers-color-scheme dark */
    --bg: #0f172a; --surface: #1e293b; --surface-2: #334155; --ink: #f8fafc; --muted: #94a3b8; --line: #334155; --accent: #38bdf8; --accent-hover: #7dd3fc; --accent-soft: #0c4a6e; --ok: #22c55e; --ok-bg: #14532d; --warn: #fbbf24; --warn-bg: #78350f; --bad: #ef4444; --bad-bg: #7f1d1d; --neut: #94a3b8; --neut-bg: #334155;
}
:root[data-theme="light"] { /* Same as light */
    --bg: #f3f6f9; --surface: #ffffff; --surface-2: #f8fafc; --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; --accent: #0284c7; --accent-hover: #0369a1; --accent-soft: #e0f2fe; --ok: #16a34a; --ok-bg: #dcfce7; --warn: #d97706; --warn-bg: #fef3c7; --bad: #dc2626; --bad-bg: #fee2e2; --neut: #64748b; --neut-bg: #f1f5f9;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--ink); 
  font-family: system-ui, "Segoe UI", "Arial Hebrew", Arial, sans-serif;
  font-size: 15px; 
  line-height: 1.6; 
}

/* ---- top app bar ---- */
.appbar { 
  position: sticky; top: 0; z-index: 15; 
  background: var(--surface); 
  border-bottom: 1px solid var(--line); 
  box-shadow: var(--shadow-sm); 
}
.appbar-in { 
  max-width: 1280px; margin: 0 auto; 
  display: flex; align-items: center; gap: 20px; 
  padding: 0 20px; height: 64px; 
}
.brand { 
  display: flex; align-items: center; gap: 10px; 
  font-weight: 700; font-size: 18px; white-space: nowrap; 
}
.brand .logo { 
  width: 36px; height: 36px; border-radius: 10px; 
  background: var(--accent); color: #fff; 
  display: flex; align-items: center; justify-content: center; font-size: 18px; 
}
.nav { display: flex; gap: 8px; height: 100%; flex: 1; margin-right: 20px;}
.nav button { 
  background: transparent; border: none; 
  color: var(--muted); font: inherit; font-weight: 600; font-size: 15px; 
  padding: 0 16px; height: 100%; cursor: pointer; 
  border-bottom: 3px solid transparent; 
  display: flex; align-items: center; gap: 8px; 
  transition: all 0.2s ease;
}
.nav button:hover { color: var(--ink); background: var(--surface-2); }
.nav button[aria-selected="true"] { 
  color: var(--accent); border-bottom-color: var(--accent); 
}
.appbar .acts { display: flex; align-items: center; gap: 10px; }
.sync { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; margin-left: 10px;}
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ok); }

/* ---- Main Container ---- */
.wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 80px; }
h1 { font-size: 24px; margin: 0; font-weight: 700;}
.sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

/* ---- stat strip ---- */
.tiles { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
  gap: 16px; margin-bottom: 24px; 
}
.tile { 
  background: var(--surface); border: 1px solid var(--line); 
  border-radius: var(--radius-lg); padding: 20px; 
  position: relative; overflow: hidden; 
  box-shadow: var(--shadow-sm); transition: transform 0.2s;
}
.tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.tile::before { content: ""; position: absolute; inset-inline-start: 0; top: 0; bottom: 0; width: 4px; background: var(--neut); }
.tile.ok::before { background: var(--ok); }
.tile.warn::before { background: var(--warn); }
.tile.acc::before { background: var(--accent); }
.tile .n { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 4px;}
.tile .l { color: var(--muted); font-size: 14px; font-weight: 500;}
.tile.ok .n { color: var(--ok); }
.tile.warn .n { color: var(--warn); }
.tile.acc .n { color: var(--accent); }

/* ---- section panel ---- */
.panel { 
  background: var(--surface); border: 1px solid var(--line); 
  border-radius: var(--radius-lg); overflow: hidden; 
  box-shadow: var(--shadow-sm); 
}
.toolbar { 
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center; 
  padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--line); 
}
#q { 
  flex: 1; min-width: 250px; background: var(--surface-2); 
  border: 1px solid var(--line); border-radius: var(--radius-md); 
  padding: 10px 14px; color: var(--ink); font-size: 15px; transition: all 0.2s;
}
select.flt { 
  background: var(--surface-2); border: 1px solid var(--line); 
  border-radius: var(--radius-md); padding: 10px 36px 10px 14px; 
  color: var(--ink); font: inherit; font-size: 14px; font-weight: 500; cursor: pointer; 
  appearance: none; 
  background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); 
  background-position: left 16px center, left 11px center; 
  background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; transition: all 0.2s;
}
input:focus, select:focus, textarea:focus { 
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); 
}
.count { color: var(--muted); font-size: 13px; font-weight: 600; margin-inline-start: auto; white-space: nowrap; }

/* ---- data table ---- */
.tbl-scroll { max-height: 65vh; overflow: auto; }
table.data { width: 100%; border-collapse: collapse; font-size: 14.5px; }
table.data th {
  position: sticky; top: 0; z-index: 10; background: var(--surface-2); color: var(--muted);
  font-weight: 600; font-size: 13px; text-align: right; padding: 14px 20px;
  white-space: nowrap; cursor: pointer; user-select: none; border-bottom: 2px solid var(--line);
}
table.data th:hover { color: var(--ink); background: var(--line); }
table.data th .ar { opacity: .5; font-size: 11px; margin-inline-start: 4px; }
table.data th.active { color: var(--accent); }
table.data td { padding: 14px 20px; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.data tbody tr { cursor: pointer; transition: background 0.15s; }
table.data tbody tr:hover { background: var(--surface-2); }
table.data tbody tr:last-child td { border-bottom: none; }
td .nm { font-weight: 600; color: var(--ink); }
.empty { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 16px; font-weight: 500; }
/* ---- client tiles grid ---- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; padding: 18px; }
.ccard { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 18px 18px 16px; cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s; display: flex; flex-direction: column; gap: 12px; min-height: 104px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
.ccard::before { content: ""; position: absolute; inset-inline-start: 0; top: 0; bottom: 0; width: 4px; background: var(--neut); }
.ccard.ok::before { background: var(--ok); } .ccard.warn::before { background: var(--warn); } .ccard.bad::before { background: var(--bad); } .ccard.neut::before { background: var(--neut); }
.ccard:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-md); }
.ccard .cn { font-weight: 700; font-size: 16.5px; line-height: 1.3; color: var(--ink); }
.ccard .cmeta { margin-top: auto; }
@media(max-width:768px){ .grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; } .ccard { padding: 14px; min-height: 88px; } }

/* ---- breakdown (overview tab) ---- */
.brk { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
.brk .box { 
  background: var(--surface); border: 1px solid var(--line); 
  border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); 
}
.brk h3 { margin: 0 0 20px; font-size: 18px; font-weight: 600; color: var(--ink);}
.brow { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 14px; }
.brow .lbl { width: 140px; color: var(--muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brow .bar { flex: 1; height: 8px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
.brow .bar span { display: block; height: 100%; background: var(--accent); border-radius: 99px; }
.brow .v { width: 40px; text-align: left; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink);}

/* ---- Badges & Pills ---- */
.pill { 
  font-size: 12.5px; font-weight: 600; padding: 4px 12px; 
  border-radius: 999px; white-space: nowrap; display: inline-block; 
}
.pill.ok { background: var(--ok-bg); color: var(--ok); }
.pill.warn { background: var(--warn-bg); color: var(--warn); }
.pill.bad { background: var(--bad-bg); color: var(--bad); }
.pill.neut { background: var(--neut-bg); color: var(--neut); }

.tag { 
  font-size: 12px; font-weight: 500; background: var(--surface-2); 
  border: 1px solid var(--line); color: var(--muted); 
  padding: 3px 8px; border-radius: 6px; 
}
.tag.pay { background: var(--accent-soft); color: var(--accent); border-color: transparent; font-weight: 600; }
.mono { font-variant-numeric: tabular-nums; direction: ltr; unicode-bidi: embed; font-family: monospace; font-size: 14px;}

/* ---- tasks tab ---- */
.taskadd { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.taskadd input { flex: 1; min-width: 150px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 11px 14px; color: var(--ink); font: inherit; }
.taskadd input#tk_due { flex: 0 0 auto; min-width: 140px; }
.tk { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; background: var(--surface); box-shadow: var(--shadow-sm); }
.tk.done { opacity: .55; }
.tk .cb { width: 22px; height: 22px; cursor: pointer; flex: none; margin-top: 2px; accent-color: var(--accent); }
.tk .body { flex: 1; min-width: 0; }
.tk .t { font-weight: 600; font-size: 15px; }
.tk.done .t { text-decoration: line-through; }
.tk .sub { color: var(--muted); font-size: 13px; margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

/* ---- Overlays & Modals ---- */
.ovl { 
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; 
}
.ovl.on { display: flex; animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.card { 
  background: var(--surface); border: 1px solid var(--line); 
  border-radius: var(--radius-lg); max-width: 700px; width: 100%; 
  max-height: 90vh; overflow-y: auto; padding: 32px; box-shadow: var(--shadow-lg); 
  animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.card h2 { margin: 0 0 16px; font-size: 22px; font-weight: 700; border-bottom: 2px solid var(--surface-2); padding-bottom: 12px;}
.field { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--surface-2); }
.field:last-child { border-bottom: none; }
.field .k { color: var(--muted); font-size: 14px; font-weight: 500; }
.field .v { font-weight: 600; text-align: left; font-size: 15px;}

/* Form Styling - Grid Layout */
.edit { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
  gap: 16px 24px; 
  margin-top: 16px; 
}
.edit label { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 6px; display: block;}
.edit input, .edit select, .edit textarea { 
  width: 100%; background: var(--surface); border: 1px solid var(--line); 
  border-radius: var(--radius-md); padding: 12px; color: var(--ink); font: inherit; 
  transition: all 0.2s;
}
.edit textarea { grid-column: 1 / -1; resize: vertical; min-height: 80px;} /* Textareas span full width */
.edit > div { display: flex; flex-direction: column; } /* Wrap inputs that are generated by JS if needed, but styling directly works too */

/* Buttons */
.btn { 
  background: var(--accent); color: #fff; border: none; 
  border-radius: var(--radius-md); padding: 10px 20px; font: inherit; font-weight: 600; 
  cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-sm);}
.btn:active { transform: translateY(0); }
.btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
.btn.ghost:hover { background: var(--surface-2); color: var(--ink); }
.btn.danger { background: var(--bad); }
.btn.danger:hover { background: #b91c1c; }
.btn.sm { padding: 8px 16px; font-size: 14px; border-radius: 8px; }

.abtn { 
  background: var(--surface); border: 1px solid var(--line); color: var(--muted); 
  width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 18px; 
  display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.abtn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px);}

.iconbtn { 
  background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); 
  width: 40px; height: 40px; min-width: 40px; border-radius: 10px; cursor: pointer; 
  font-size: 18px; display: flex; align-items: center; justify-content: center; flex: none; transition: all 0.2s;
}
.iconbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft);}

.rowbtns { display: flex; gap: 12px; justify-content: space-between; margin-top: 24px; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid var(--surface-2);}

/* Login Gate */
.gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.gate .box { 
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); 
  padding: 40px 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-lg);
}
.gate input { margin: 12px 0; text-align: right; padding: 12px; }

.hide { display: none !important; }
.err { color: var(--bad); font-size: 13.5px; font-weight: 500; min-height: 20px; margin-top: 10px; }

@media(max-width: 768px) {
  .appbar-in { padding: 0 16px; gap: 12px; }
  .nav { margin-right: 0;}
  .nav button { padding: 0 12px; }
  .brand span { display: none; }
  .wrap { padding: 16px 12px 80px; }
  .tiles { grid-template-columns: 1fr 1fr; }
  .edit { grid-template-columns: 1fr; gap: 12px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div style="font-size:40px; margin-bottom: 10px;">🔐</div>
    <h2 style="margin:0 0 4px; font-weight: 700;">תיק לקוחות</h2>
    <div class="sub" style="margin-bottom: 24px;">התחברות למערכת ביטוח משכנתא</div>
    <input id="loginEmail" type="email" placeholder="אימייל" autocomplete="username">
    <input id="loginPw" type="password" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%; margin-top:16px; padding: 12px;" onclick="doLogin()">כניסה</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="hide" id="app">
  <div class="appbar">
    <div class="appbar-in">
      <div class="brand"><span class="logo">🏠</span><span>תיק לקוחות</span></div>
      <nav class="nav" id="nav">
        <button data-tab="clients" aria-selected="true" onclick="setTab('clients')">📋 לקוחות</button>
        <button data-tab="tasks" aria-selected="false" onclick="setTab('tasks')">✅ משימות</button>
        <button data-tab="payments" aria-selected="false" onclick="setTab('payments')">💰 תשלומים</button>
        <button data-tab="overview" aria-selected="false" onclick="setTab('overview')">📊 סקירה</button>
      </nav>
      <div class="acts">
        <div class="sync"><span class="dot" id="syncDot"></span><span id="syncTxt">טוען...</span></div>
        <button class="btn sm" onclick="openLead()">＋ ליד חדש</button>
        <button class="abtn" onclick="openDoc()" title="הפקת מסמך">📄</button>
        <button class="abtn" onclick="openSettings()" title="הגדרות">⚙</button>
        <button class="abtn" onclick="toggleTheme()" title="מצב תצוגה">◐</button>
        <button class="abtn" onclick="doLogout()" title="יציאה">⎋</button>
      </div>
    </div>
  </div>
  <div class="wrap">
    <div class="tiles" id="tiles"></div>
    <div id="tab-clients">
      <div class="panel">
        <div class="toolbar">
          <input id="q" placeholder="🔍 חיפוש לפי שם / טלפון / ת.ז." oninput="render()">
          <select class="flt" id="fStatus" onchange="fStatus=this.value;render()"></select>
          <select class="flt" id="fChannel" onchange="fChannel=this.value;render()"></select>
          <select class="flt" id="fSort" onchange="sortKey=this.value;sortDir=1;render()">
            <option value="name">מיון: שם</option>
            <option value="status">מיון: סטטוס</option>
            <option value="mortgage">מיון: משכנתא</option>
            <option value="close_date">מיון: תאריך סגירה</option>
          </select>
          <span class="count" id="count"></span>
        </div>
        <div class="grid" id="grid"></div>
      </div>
    </div>
    <div id="tab-tasks" class="hide">
      <div class="panel" style="padding:18px">
        <div class="taskadd">
          <input id="tk_text" placeholder="מה צריך לעשות? (למשל: להתקשר ל...)" onkeydown="if(event.key==='Enter')addTask()">
          <input id="tk_client" placeholder="לקוח (אופציונלי)">
          <input id="tk_due" type="date" title="תאריך יעד">
          <button class="btn" onclick="addTask()">➕ הוסף</button>
        </div>
        <div id="taskList"></div>
      </div>
    </div>
    <div id="tab-payments" class="hide">
      <div class="tiles" id="payKpis"></div>
      <div class="brk">
        <div class="box"><h3>הכנסות לפי ערוץ</h3><div id="payByChan"></div></div>
        <div class="box"><h3>הכנסות לפי חודש</h3><div id="payByMonth"></div></div>
      </div>
      <div class="panel" style="margin-top:16px">
        <div style="padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700">הוצאות — מתנות ללקוחות, פרסום, מפנים</div>
        <div class="taskadd">
          <input id="ex_date" type="date" title="תאריך" style="max-width:160px">
          <select class="flt" id="ex_type"><option>מתנה ללקוח</option><option>פרסום</option><option>תשלום למפנה</option><option>אחר</option></select>
          <input id="ex_amount" inputmode="numeric" placeholder="סכום ₪" style="max-width:120px">
          <input id="ex_payee" placeholder="למי / פירוט (אופציונלי)">
          <button class="btn" onclick="addExpense()">➕ הוצאה</button>
        </div>
        <div id="expList"></div>
      </div>
    </div>
    <div id="tab-overview" class="hide"><div class="brk" id="brk"></div></div>
  </div>
</div>

<div class="ovl" id="ovl" onclick="if(event.target===this)closeCard()"><div class="card" id="cardBody"></div></div>

<script>
// --- הפונקציונליות נשארה זהה לחלוטין ---
const SB_URL="https://ktcabahjyjmtfavlsdks.supabase.co";
const SB_KEY="sb_publishable_jYj0az-JCWUc3ga1fRYcew_La1y7qVw";

let session=JSON.parse(localStorage.getItem("sb_session")||"null");

function chan(c){return (c.channels||"").split(",").map(s=>s.trim()).filter(Boolean);}

async function api(path,opts={}){
  opts.headers=Object.assign({"apikey":SB_KEY,"Authorization":"Bearer "+(session&&session.access_token),"Content-Type":"application/json"},opts.headers||{});
  let r=await fetch(SB_URL+path,opts);
  if(r.status===401 && session&&session.refresh_token){
    if(await refresh()){opts.headers["Authorization"]="Bearer "+session.access_token;r=await fetch(SB_URL+path,opts);}
  }
  return r;
}
async function refresh(){
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:session.refresh_token})});
  if(!r.ok){logoutLocal();return false;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email:session.email};localStorage.setItem("sb_session",JSON.stringify(session));return true;
}
async function doLogin(){
  const email=val("loginEmail").trim(),pw=val("loginPw");
  document.getElementById("loginErr").textContent="";
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
  if(!r.ok){document.getElementById("loginErr").textContent="אימייל או סיסמה שגויים";return;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email};localStorage.setItem("sb_session",JSON.stringify(session));
  startApp();
}
function logoutLocal(){session=null;localStorage.removeItem("sb_session");document.getElementById("app").classList.add("hide");document.getElementById("gate").classList.remove("hide");}
async function doLogout(){try{await fetch(SB_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+session.access_token}});}catch(e){}logoutLocal();}

async function startApp(){
  document.getElementById("gate").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  await loadClients(); loadTasks(); loadExpenses();
  setInterval(()=>{if(!document.hidden){loadClients(true);loadTasks();loadExpenses();}},30000);
  window.addEventListener("focus",()=>{loadClients(true);loadTasks();loadExpenses();});
}
let TASKS=[];
async function loadTasks(){
  try{
    const r=await api("/rest/v1/tasks?select=*&order=done.asc,due_date.asc,created_at.asc&limit=1000");
    if(r.ok){TASKS=await r.json(); if(activeTab==="tasks")renderTasks();}
  }catch(e){}
}
function renderTasks(){
  const el=document.getElementById("taskList");
  if(!TASKS.length){el.innerHTML='<div class="empty">אין משימות עדיין. הוסף למעלה 👆</div>';return;}
  el.innerHTML=TASKS.map(t=>`<div class="tk ${t.done?'done':''}">
      <input type="checkbox" class="cb" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)">
      <div class="body"><div class="t">${esc(t.text)}</div>
        <div class="sub">${t.client_name?`<span class="tag">👤 ${esc(t.client_name)}</span>`:''}${t.due_date?`<span>📅 ${esc(t.due_date)}</span>`:''}${t.details?`<span>${esc(t.details)}</span>`:''}</div>
      </div>
      <button class="abtn" onclick="delTask('${t.id}')" title="מחק">🗑</button>
    </div>`).join("");
}
async function addTask(){

  const o={text,client_name:val("tk_client").trim()||null,due_date:val("tk_due")||null,done:false};

  document.getElementById("tk_text").value="";document.getElementById("tk_client").value="";document.getElementById("tk_due").value="";

}
async function toggleTask(id,done){
  await api("/rest/v1/tasks?id=eq."+id,{method:"PATCH",headers:{"Prefer":"return=minimal"},body:JSON.stringify({done})});

}
async function delTask(id){
  if(!confirm("למחוק את המשימה?"))return;
  await api("/rest/v1/tasks?id=eq."+id,{method:"DELETE",headers:{"Prefer":"return=minimal"}});

}

const normd=s=>(s||"").replace(/\D/g,"").replace(/^972/,"").replace(/^0/,"");
function buildChips(){populateFilters();}
function populateFilters(){
  const fs=document.getElementById("fStatus");
  fs.innerHTML=[["הכל","כל הסטטוסים"],...STATUSES.map(s=>[s,`${s} (${CLIENTS.filter(c=>c.status===s).length})`])]
    .map(([v,l])=>`<option value="${esc(v)}" ${v===fStatus?"selected":""}>${esc(l)}</option>`).join("");
  const chans=[...new Set(CLIENTS.flatMap(chan))];
  const fc=document.getElementById("fChannel");
  fc.innerHTML=[["הכל","כל הערוצים"],...chans.map(s=>[s,`${s} (${CLIENTS.filter(c=>chan(c).includes(s)).length})`])]
    .map(([v,l])=>`<option value="${esc(v)}" ${v===fChannel?"selected":""}>${esc(l)}</option>`).join("");
}
function setTab(t){
  activeTab=t;
  document.querySelectorAll("#nav button").forEach(b=>b.setAttribute("aria-selected", b.dataset.tab===t));
  ["clients","tasks","payments","overview"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("hide",x!==t));
  render();
}
function sortBy(k){ if(sortKey===k)sortDir=-sortDir; else{sortKey=k;sortDir=1;} render(); }
function cmp(a,b){
  const col=COLS.find(c=>c.k===sortKey)||COLS[0];
  if(col.t==="num"){const x=parseInt(String(a[sortKey]||"").replace(/\D/g,""))||0,y=parseInt(String(b[sortKey]||"").replace(/\D/g,""))||0;return (x-y)*sortDir;}
  if(col.t==="status"){return (STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status))*sortDir;}
  if(col.t==="phone"){const x=normd(a.phone),y=normd(b.phone);return (x<y?-1:x>y?1:0)*sortDir;}
  return String(a[sortKey]||"").localeCompare(String(b[sortKey]||""),"he")*sortDir;
}
function filtered(){
  const q=document.getElementById("q").value.trim();let a=CLIENTS.slice();
  if(fStatus!=="הכל")a=a.filter(c=>c.status===fStatus);
  if(fChannel!=="הכל")a=a.filter(c=>chan(c).includes(fChannel));
  if(q){const qd=normd(q);a=a.filter(c=>{if((c.name||"").includes(q))return true;if(!qd)return false;return normd(c.phone).includes(qd)||normd(c.id_number).includes(qd);});}
  return a.sort(cmp);
}
function tiles(){
  const a=CLIENTS,closed=a.filter(c=>c.closed||(c.status||"").startsWith("נסגר")).length,inproc=a.filter(c=>(c.status||"").startsWith("הצעה")).length,waiting=a.filter(c=>c.status==="ממתין לשליחת ליד").length;
  const paid=a.reduce((s,c)=>s+(parseInt(String(c.paid_to_avi||"").replace(/\D/g,""))||0),0);
  const T=[["acc",a.length,"סה״כ לקוחות"],["ok",closed,"נסגרו"],["warn",inproc,"בהצעה / בתהליך"],["",waiting,"ממתין לשליחה"],["",money(paid)+" ₪","סה״כ התקבל"]];
  document.getElementById("tiles").innerHTML=T.map(([c,n,l])=>`<div class="tile ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
}
function cell(c,k){
  if(k==="name")return `<span class="nm">${esc(c.name)}</span>`;
  if(k==="phone")return c.phone?`<span class="mono">${fmtPhone(c.phone)}</span>`:"";
  if(k==="status")return `<span class="pill ${pillClass(c.status)}">${esc(c.status)}</span>`;
  if(k==="channels")return chan(c).length?chan(c).map(x=>`<span class="tag">${esc(x)}</span>`).join(" "):"<span style='color:var(--muted)'>—</span>";
  if(k==="mortgage")return c.mortgage?`<span class="mono">${money(parseInt(String(c.mortgage).replace(/\D/g,""))||0)} ₪</span>`:"";
  if(k==="premium")return c.premium?`<span class="mono">${esc(c.premium)} ₪</span>`:"";
  if(k==="commission_to_client")return c.commission_to_client?`<span class="tag pay">${esc(c.commission_to_client)} ₪</span>`:"";
  if(k==="paid_to_avi")return c.paid_to_avi?`<span class="mono">${esc(c.paid_to_avi)} ₪</span>`:"";
  return "";
}
function render(){
  tiles();populateFilters();
  if(activeTab==="overview"){renderOverview();return;}
  if(activeTab==="tasks"){renderTasks();return;}
  if(activeTab==="payments"){renderPayments();return;}
  const a=filtered();
  document.getElementById("count").textContent=`${a.length} לקוחות`;
  document.getElementById("grid").innerHTML = a.length
    ? a.map(c=>`<div class="ccard ${pillClass(c.status)}" onclick="openCard('${c.id}')">
        <div class="cn">${esc(c.name)}</div>

}
// ---- Payments (income aggregated from clients + expenses table) ----
let EXPENSES=[];
const _D=v=>parseInt(String(v||"").replace(/\D/g,""))||0;
function payChan(c){const s=c.status||"";for(const x of ["ישיר","ליברה","שוירץ"])if(s.includes(x))return x;const ch=c.channels||"";for(const x of ["ישיר","ליברה","שוירץ"])if(ch.includes(x))return x;return "אחר";}
async function loadExpenses(){
  try{const r=await api("/rest/v1/expenses?select=*&order=date.desc,created_at.desc&limit=1000");
    if(r.ok){EXPENSES=await r.json(); if(activeTab==="payments")renderPayments();}}catch(e){}
}
function renderPayments(){
  const paidCl=CLIENTS.filter(c=>_D(c.paid_to_avi));
  const income=paidCl.reduce((s,c)=>s+_D(c.paid_to_avi),0);
  const byChan={"ישיר":0,"ליברה":0,"שוירץ":0}; paidCl.forEach(c=>{const k=payChan(c);byChan[k]=(byChan[k]||0)+_D(c.paid_to_avi);});
  const gifts=CLIENTS.reduce((s,c)=>s+_D(c.commission_to_client),0);
  const expTotal=EXPENSES.reduce((s,e)=>s+_D(e.amount),0);
  const net=income-gifts-expTotal;
  const K=[["acc",income,"סה״כ התקבל"],["warn",gifts,"מתנות ללקוחות"],["bad",expTotal,"הוצאות (פרסום/מפנים)"],[net>=0?"ok":"bad",net,"רווח נטו"]];
  document.getElementById("payKpis").innerHTML=K.map(([c,n,l])=>`<div class="tile ${c}"><div class="n">${money(n)} ₪</div><div class="l">${l}</div></div>`).join("");
  const bar=(arr)=>{const m=Math.max(1,...arr.map(x=>x[1]));return arr.map(([l,n])=>`<div class="brow"><span class="lbl">${esc(l)}</span><span class="bar"><span style="width:${Math.round(n/m*100)}%"></span></span><span class="v">${money(n)}</span></div>`).join("")||'<div style="color:var(--muted);font-size:14px;padding:8px 0">אין נתונים</div>';};
  document.getElementById("payByChan").innerHTML=bar(["ישיר","ליברה","שוירץ"].map(x=>[x,byChan[x]||0]));
  const byMonth={}; paidCl.forEach(c=>{const m=c.close_date?c.close_date.slice(0,7):(c.month||"ללא תאריך");byMonth[m]=(byMonth[m]||0)+_D(c.paid_to_avi);});
  const months=Object.keys(byMonth).sort().reverse();
  document.getElementById("payByMonth").innerHTML=bar(months.map(m=>[m,byMonth[m]]));
  document.getElementById("expList").innerHTML=EXPENSES.length?EXPENSES.map(e=>`<div class="tk">
      <div class="body"><div class="t">${money(_D(e.amount))} ₪ · ${esc(e.type||"")}</div>
        <div class="sub">${e.payee?`<span class="tag">${esc(e.payee)}</span>`:""}${e.date?`<span>📅 ${esc(e.date)}</span>`:""}${e.note?`<span>${esc(e.note)}</span>`:""}</div></div>
      <button class="abtn" onclick="delExpense('${e.id}')" title="מחק">🗑</button>
    </div>`).join(""):'<div class="empty">אין הוצאות רשומות. הוסף למעלה 👆</div>';
}
async function addExpense(){

function renderOverview(){
  const byStatus=STATUSES.map(s=>[s,CLIENTS.filter(c=>c.status===s).length]).filter(x=>x[1]);
  const chans=[...new Set(CLIENTS.flatMap(chan))];
  const byChan=chans.map(s=>[s,CLIENTS.filter(c=>chan(c).includes(s)).length]).sort((a,b)=>b[1]-a[1]);
  const byRef=[...new Set(CLIENTS.map(c=>c.referral_source).filter(Boolean))].map(s=>[s,CLIENTS.filter(c=>c.referral_source===s).length]).sort((a,b)=>b[1]-a[1]);
  const mx=arr=>Math.max(1,...arr.map(x=>x[1]));
  const bars=(arr,cls)=>{const m=mx(arr);return arr.map(([l,n])=>`<div class="brow"><span class="lbl">${esc(l)}</span><span class="bar"><span style="width:${Math.round(n/m*100)}%${cls?';background:'+cls:''}"></span></span><span class="v">${n}</span></div>`).join("")||`<div style="color:var(--muted);font-size:14px; padding: 10px 0;">אין נתונים זמינים</div>`;}
  document.getElementById("brk").innerHTML=`
    <div class="box"><h3>חלוקה לפי סטטוס</h3>${bars(byStatus)}</div>
    <div class="box"><h3>חלוקה לפי ערוץ (ליד הועבר ל)</h3>${bars(byChan)}</div>
    <div class="box"><h3>חלוקה לפי גורם מפנה</h3>${bars(byRef)}</div>`;
}

function collectEdit(){
  const o={};EDITABLE.forEach(([f])=>{o[f]=val("ed_"+f);});
  o.phone=o.phone.replace(/\D/g,"").replace(/^972/,"").replace(/^0/,"");
  o.channels=CHANS.filter((ch,i)=>document.getElementById("ch"+i).checked).join(", ");
  o.paid_to_avi=val("ed_paid_to_avi");
  o.status=val("ed_status");o.closed=(o.status||"").startsWith("נסגר");
  ["lead_date","close_date","bank_details"].forEach(f=>{const el=document.getElementById("ed_"+f);if(el)o[f]=el.value;});
  if(o.closed && ("close_date" in o) && !o.close_date) o.close_date=new Date().toISOString().slice(0,10);
  return o;
}
function calcPay(){
  const s=val("ed_status");
  const prem=parseInt((val("ed_premium")||"").replace(/\D/g,""))||0;
  const mort=parseInt((val("ed_mortgage")||"").replace(/\D/g,""))||0;
  let amt=0;
  if(s.includes("ישיר")) amt=mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  else if(s.includes("ליברה")) amt=prem>=20?300:prem>=15?200:(prem>0?100:0);
  else if(s.includes("שוירץ")) amt=prem?(prem>=75?4:3)*prem:0;
  if(amt) document.getElementById("ed_paid_to_avi").value=amt;
  else alert("יש לבחור סטטוס 'נסגר ב[ערוץ]' ולהזין נתוני משכנתא/פרמיה קודם לכן.");
}

const LDKEYS=['ld_name','ld_phone','ld_id','ld_mort','ld_type','ld_prem','ld_age','ld_val'];

function saveLeadDraft(){

async function cloudSaveDraft(){

    if(!raw){ await api("/rest/v1/drafts?key=eq.lead_draft",{method:"DELETE",headers:{"Prefer":"return=minimal"}}); return; }
    await api("/rest/v1/drafts?on_conflict=key",{method:"POST",headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({key:"lead_draft",data:JSON.parse(raw),updated_at:new Date().toISOString()})});

async function restoreLeadDraft(){

function computeRec(){
  const name=val('ld_name'), phone=val('ld_phone').replace(/\D/g,'').replace(/^972/,'').replace(/^0/,''), idn=val('ld_id');
  const mort=num('ld_mort'), prem=num('ld_prem'), age=num('ld_age'), kval=num('ld_val');
  const isNew=val('ld_type')==='חדש';
  const yashir = mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  const libra = prem? (prem>=20?300:prem>=15?200:100) : 300;
  const schwartz = prem? (prem>=75?4:3)*prem : 0;
  const bMonthly = kval? Math.round(kval/1000*0.88/12) : 0;
  let rec, why, chans=[];
  if(isNew){
    if(mort<=1200000){ rec="ביטוח ישיר + ליברה (במקביל)"; why="ביטוח חדש עד 1.2 מ': ישיר משלם 450, אבל ליברה לרוב זול יותר ללקוח — שלח לשניהם כדי לא לפספס (מקסימום הפרש 150 ₪)."; chans=["ישיר","ליברה"]; }
    else { rec="ביטוח ישיר"; why="ביטוח חדש מעל 1.2 מ' — ישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
  } else {
    if(mort>=2000000){ rec="ביטוח ישיר"; why="הסבה מ-2 מ' ומעלה — ציון מאשר, וישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
    else if(mort>=1500000){ rec="ביטוח ישיר — דרוש אישור מציון (אחרת ליברה)"; why="הסבה 1.5–2 מ': בקש אישור מציון בטלפון/וואטסאפ. אם לא — ליברה ("+money(libra)+" ₪)."; chans=["ישיר","ליברה"]; }
    else {
      if((age>=60||prem>=200) && schwartz>libra){ rec="שוירץ"; why="הסבה, לקוח מבוגר/פרמיה גבוהה — שוירץ משלם "+money(schwartz)+" ₪ (יותר מליברה "+money(libra)+")."; chans=["שוירץ"]; }
      else { rec="ליברה"; why="הסבה מתחת ל-1.5 מ' — ישיר לא לוקח הסבות; ליברה משלם "+money(libra)+" ₪"+(schwartz?" (שוירץ: "+money(schwartz)+")":"")+"."; chans=["ליברה"]; }
    }
  }
  let rows='';
  rows+=`<div class="field"><span class="k">ביטוח ישיר</span><span class="v mono">${money(yashir)} ₪ ${(isNew||mort>=2000000)?'':(mort>=1500000?'<span class="tag">הסבה — אישור</span>':'<span class="tag bad">הסבה — לא זמין</span>')}</span></div>`;
  rows+=`<div class="field"><span class="k">ליברה</span><span class="v mono">${money(libra)} ₪ ${prem?'':'<span class="tag">משוער ≥20</span>'}</span></div>`;
  rows+=`<div class="field"><span class="k">שוירץ</span><span class="v mono">${schwartz?money(schwartz)+' ₪':'<span class="tag">הזן פרמיה</span>'}</span></div>`;
  if(bMonthly) rows+=`<div class="field"><span class="k">פרמיית מבנה (שוירץ)</span><span class="v mono">~${bMonthly} ₪ לחודש</span></div>`;
  const libraDraft=`אל: danielp@lbr.co.il\nנושא: ${name}\n\n${phone?'0'+phone:''} ${isNew?'משכנתא חדשה על סך':'ייתרה'} ${money(mort)}`;
  const yashirDoc=`שם: ${name}\nת.ז.: ${idn}\nטלפון: ${phone?'0'+phone:''}\nסכום משכנתא: ${money(mort)} ₪`;
  _lead={name,phone,idn,mort,chans:chans.join(", ")};
  document.getElementById('recOut').innerHTML=`
    <div style="background:var(--accent-soft);border: 1px solid var(--accent); border-radius:12px;padding:16px;margin-bottom:20px;">
      <div style="font-weight:700;color:var(--accent-hover);font-size:18px; margin-bottom: 6px;">➡ ${esc(rec)}</div>
      <div style="font-size:14px;color:var(--ink);">${esc(why)}</div>
    </div>
    <div style="background: var(--surface-2); border-radius: 12px; padding: 0 16px;">
      ${rows}
    </div>
    <div class="edit" style="margin-top: 20px;">
      <div><label>טיוטת מייל לליברה (לחיצה להעתקה)</label><textarea onclick="this.select()" readonly style="cursor:pointer; background: var(--surface-2);">${esc(libraDraft)}</textarea></div>
      <div><label>מסמך לישיר (לחיצה להעתקה)</label><textarea onclick="this.select()" readonly style="cursor:pointer; background: var(--surface-2);">${esc(yashirDoc)}</textarea></div>
    </div>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="saveLead()">שמור כלקוח במערכת</button></div>`;
}
