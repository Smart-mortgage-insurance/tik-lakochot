<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>תיק לקוחות — ביטוח משכנתא</title>
<style>
:root{
  --bg:#eef1f5; --surface:#ffffff; --surface-2:#f4f6f9; --ink:#18202e; --muted:#5c6779;
  --line:#d9dee7; --accent:#0f6d68; --accent-soft:#d7ebe9;
  --ok:#1a8a57; --ok-bg:#e0f2e8; --warn:#b5751f; --warn-bg:#f8ecd7; --bad:#bf3f38; --bad-bg:#f8e0de;
  --neut:#6a7383; --neut-bg:#e8ebf0;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#10141b; --surface:#18202a; --surface-2:#1e2732; --ink:#e8ecf2; --muted:#98a3b3;
  --line:#2a3542; --accent:#3fb5ad; --accent-soft:#173430;
  --ok:#48c78e; --ok-bg:#123526; --warn:#e0a94a; --warn-bg:#3a2e15; --bad:#e06a62; --bad-bg:#3a1f1d;
  --neut:#8a94a4; --neut-bg:#232c38;
}}
:root[data-theme="dark"]{--bg:#10141b; --surface:#18202a; --surface-2:#1e2732; --ink:#e8ecf2; --muted:#98a3b3; --line:#2a3542; --accent:#3fb5ad; --accent-soft:#173430; --ok:#48c78e; --ok-bg:#123526; --warn:#e0a94a; --warn-bg:#3a2e15; --bad:#e06a62; --bad-bg:#3a1f1d; --neut:#8a94a4; --neut-bg:#232c38;}
:root[data-theme="light"]{--bg:#eef1f5; --surface:#ffffff; --surface-2:#f4f6f9; --ink:#18202e; --muted:#5c6779; --line:#d9dee7; --accent:#0f6d68; --accent-soft:#d7ebe9; --ok:#1a8a57; --ok-bg:#e0f2e8; --warn:#b5751f; --warn-bg:#f8ecd7; --bad:#bf3f38; --bad-bg:#f8e0de; --neut:#6a7383; --neut-bg:#e8ebf0;}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,"Segoe UI","Arial Hebrew",Arial,sans-serif;font-size:15px;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
h1{font-size:24px;margin:0;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:13px;margin-top:3px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.tile .n{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.tile .l{color:var(--muted);font-size:12px;margin-top:5px}
.tile.ok .n{color:var(--ok)} .tile.warn .n{color:var(--warn)} .tile.acc .n{color:var(--accent)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
#q{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--ink);font-size:15px}
#q:focus{outline:2px solid var(--accent);outline-offset:1px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;user-select:none}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.count{color:var(--muted);font-size:13px;margin:6px 2px 10px}
.list{display:flex;flex-direction:column;gap:8px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s}
.row:hover{border-color:var(--accent)}
.row .nm{font-weight:600;flex:1;min-width:0}
.row .meta{color:var(--muted);font-size:12.5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.pill.ok{background:var(--ok-bg);color:var(--ok)} .pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.bad{background:var(--bad-bg);color:var(--bad)} .pill.neut{background:var(--neut-bg);color:var(--neut)}
.tag{font-size:11.5px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);padding:2px 7px;border-radius:6px}
.tag.pay{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.mono{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:embed}
/* modal */
.ovl{position:fixed;inset:0;background:rgba(10,14,20,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
.ovl.on{display:flex}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:20px}
.card h2{margin:0 0 2px;font-size:21px}
.field{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
.field .k{color:var(--muted);font-size:13px} .field .v{font-weight:600;text-align:left}
.edit{margin-top:14px;display:flex;flex-direction:column;gap:8px}
label{font-size:12.5px;color:var(--muted)}
select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px;color:var(--ink);font:inherit}
.btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font:inherit;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.rowbtns{display:flex;gap:8px;justify-content:space-between;margin-top:16px}
.foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px;justify-content:center}
.foot .btn{font-size:13px;padding:8px 12px}
/* login */
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
.gate .box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;width:300px;text-align:center}
.gate input{width:100%;margin:14px 0;padding:11px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font:inherit;text-align:center}
.hide{display:none!important}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div style="font-size:34px">🔒</div>
    <h2 style="margin:8px 0 0">תיק לקוחות</h2>
    <div class="sub">הזן סיסמה לפענוח הנתונים</div>
    <input id="pw" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn" style="width:100%" onclick="tryLogin()">כניסה</button>
    <div id="pwerr" style="color:var(--bad);font-size:12px;margin-top:8px;height:14px"></div>
  </div>
</div>
<div class="wrap hide" id="app">
  <header class="top">
    <div>
      <h1>תיק לקוחות — ביטוח משכנתא</h1>
      <div class="sub">מקורות: ליברה · ישיר · גיליונות · מיילים · הקלטות · הנתונים מוצפנים</div>
    </div>
    <button class="chip" onclick="toggleTheme()">מצב כהה/בהיר</button>
  </header>
  <div class="tiles" id="tiles"></div>
  <div class="toolbar"><input id="q" placeholder="חיפוש לפי שם / טלפון / ת.ז." oninput="render()"></div>
  <div class="chips" id="statusChips" style="margin-bottom:8px"></div>
  <div class="chips" id="channelChips"></div>
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
  <div class="foot">
    <button class="btn ghost" onclick="exportData()">⬇ גיבוי (ייצוא)</button>
    <button class="btn ghost" onclick="document.getElementById('imp').click()">⬆ שחזור (ייבוא)</button>
    <input type="file" id="imp" class="hide" accept="application/json" onchange="importData(event)">
  </div>
</div>
<div class="ovl" id="ovl" onclick="if(event.target===this)closeCard()"><div class="card" id="cardBody"></div></div>

let BASE=[];
const STATUSES=["נסגר","הצעה - בתהליך","עבר לישיר - לא סגר","ביטל סגירה","לזיהוי מהקלטות","לא רלוונטי","לא ידוע"];
const pillClass=s=>s==="נסגר"?"ok":(s==="עבר לישיר - לא סגר"||s==="הצעה - בתהליך")?"warn":s==="ביטל סגירה"?"bad":"neut";
let overrides=JSON.parse(localStorage.getItem("clientOverrides")||"{}");
let fStatus="הכל",fChannel="הכל";
function b64d(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function decryptData(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(ENC.salt),iterations:ENC.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(ENC.iv)},key,b64d(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function tryLogin(){
  const pw=document.getElementById('pw').value;
  try{ BASE=await decryptData(pw);
    document.getElementById('gate').classList.add('hide');
    document.getElementById('app').classList.remove('hide');
    buildChips(); render();
  }catch(e){ document.getElementById('pwerr').textContent="סיסמה שגויה"; }
}
function toggleTheme(){const r=document.documentElement;const cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',cur==='dark'?'light':'dark');}
function merged(){return BASE.map((c,i)=>({...c,...(overrides[c.name]||{}),_i:i}));}
function buildChips(){
  const all=merged();
  document.getElementById('statusChips').innerHTML=["הכל",...STATUSES].map(s=>`<button class="chip" aria-pressed="${s===fStatus}" onclick="setStatus('${s}')">${s}${s==="הכל"?"":` (${all.filter(c=>c.status===s).length})`}</button>`).join('');
  const chans=["הכל",...[...new Set(all.flatMap(c=>c.channels||[]))]];
  document.getElementById('channelChips').innerHTML=chans.map(s=>`<button class="chip" aria-pressed="${s===fChannel}" onclick="setChannel('${s}')">${s==="הכל"?"כל הערוצים":s}</button>`).join('');
}
function setStatus(s){fStatus=s;buildChips();render();}
function setChannel(s){fChannel=s;buildChips();render();}
function tiles(){const a=merged();const closed=a.filter(c=>c.closed||c.status==="נסגר").length;const moved=a.filter(c=>c.status==="עבר לישיר - לא סגר").length;const comm=a.filter(c=>c.commission_to_client).length;const twice=a.filter(c=>c.closed_twice).length;const T=[["acc",a.length,"סה״כ לקוחות"],["ok",closed,"נסגרו"],["warn",moved,"עברו לישיר · לא סגרו"],["",twice,"נסגרו פעמיים"],["",comm,"עם עמלה ללקוח"]];document.getElementById('tiles').innerHTML=T.map(([c,n,l])=>`<div class="tile ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');}
function render(){
  tiles();const q=document.getElementById('q').value.trim();let a=merged();
  if(fStatus!=="הכל")a=a.filter(c=>c.status===fStatus);
  if(fChannel!=="הכל")a=a.filter(c=>(c.channels||[]).includes(fChannel));
  if(q)a=a.filter(c=>(c.name+" "+(c.phone||"")+" "+(c.id||"")).includes(q));
  document.getElementById('count').textContent=`${a.length} לקוחות`;
  document.getElementById('list').innerHTML=a.map(c=>{
    const pay=c.commission_to_client?`<span class="tag pay">עמלה: ${c.commission_to_client}</span>`:"";
    const twice=c.closed_twice?`<span class="tag">×2 ישיר→ליברה</span>`:"";
    const calls=c.call_count?`<span class="tag">${c.call_count} שיחות</span>`:"";
    const chans=(c.channels||[]).map(x=>`<span class="tag">${x}</span>`).join('');
    return `<div class="row" onclick="openCard(${c._i})"><span class="pill ${pillClass(c.status)}">${c.status}</span><span class="nm">${c.name}</span><span class="meta">${pay}${twice}${chans}${calls}<span class="mono">${c.phone||''}</span></span></div>`;
  }).join('')||`<div class="count">אין תוצאות</div>`;
}
function fld(k,v){return v?`<div class="field"><span class="k">${k}</span><span class="v">${v}</span></div>`:"";}
function openCard(i){const c=merged().find(x=>x._i===i);const phone=c.phone?`<span class="mono">${c.phone}</span>`:'';
  document.getElementById('cardBody').innerHTML=`<h2>${c.name}</h2>
    <div class="sub" style="margin-bottom:12px"><span class="pill ${pillClass(c.status)}">${c.status}</span></div>
    ${fld("טלפון",phone)}${fld("ת.ז.",c.id)}${fld("סכום משכנתא",c.mortgage&&('<span class=mono>'+Number(c.mortgage).toLocaleString()+' ₪</span>'))}
    ${fld("פרמיה חודשית",c.premium&&(c.premium+' ₪'))}
    ${fld("ערוצים",(c.channels||[]).join(" · "))}${fld("עמלה ששולמה ללקוח",c.commission_to_client)}${fld("תשלום שהתקבל",c.paid_to_avi)}
    ${fld("מקור הפניה",c.referral_source)}${fld("נסגר פעמיים",c.closed_twice?"כן (ישיר ואז ליברה)":"")}
    ${fld("סטטוס ליד בישיר",c.yashir_status)}${fld("תאריך ליד ישיר",c.yashir_date)}
    ${fld("סטטוס במייל (ליברה)",c.email_status)}${fld("פירוט מהמייל",c.email_detail)}
    ${c.call_snippet?('<div class="field"><span class="k">קטע מהשיחה המוקלטת</span></div><div style="font-size:13px;color:var(--muted);padding:6px 0;line-height:1.6">'+c.call_snippet+'</div>'):''}
    ${fld("מס' שיחות מוקלטות",c.call_count||"")}${fld("חודש",c.month)}${fld("מקורות מידע",(c.sources||[]).join(" · "))}${fld("הערות",c.notes)}
    <div class="edit"><label>סטטוס (עריכה)</label><select id="edStatus">${STATUSES.map(s=>`<option ${s===c.status?'selected':''}>${s}</option>`).join('')}</select>
    <label>הערה אישית</label><textarea id="edNote" rows="3">${(overrides[c.name]&&overrides[c.name].myNote)||''}</textarea></div>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="saveCard('${c.name.replace(/'/g,"\\'")}')">שמור</button></div>`;
  document.getElementById('ovl').classList.add('on');
}
function saveCard(name){overrides[name]=overrides[name]||{};overrides[name].status=document.getElementById('edStatus').value;overrides[name].myNote=document.getElementById('edNote').value;overrides[name].closed=(overrides[name].status==="נסגר");localStorage.setItem("clientOverrides",JSON.stringify(overrides));closeCard();buildChips();render();}
function closeCard(){document.getElementById('ovl').classList.remove('on');}
function exportData(){const blob=new Blob([JSON.stringify({overrides,exported:new Date().toISOString()},null,1)],{type:"application/json"});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="tik-backup.json";a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);overrides=d.overrides||d;localStorage.setItem("clientOverrides",JSON.stringify(overrides));buildChips();render();alert("שוחזר");}catch(x){alert("קובץ לא תקין");}};r.readAsText(f);}
document.getElementById('pw').focus();
</script>
</body>
</html>
