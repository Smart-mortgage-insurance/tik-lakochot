<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>תיק לקוחות — ביטוח משכנתא</title>
<style>
:root{--bg:#eef1f5;--surface:#fff;--surface-2:#f4f6f9;--ink:#18202e;--muted:#5c6779;--line:#d9dee7;--accent:#0f6d68;--accent-soft:#d7ebe9;--ok:#1a8a57;--ok-bg:#e0f2e8;--warn:#b5751f;--warn-bg:#f8ecd7;--bad:#bf3f38;--bad-bg:#f8e0de;--neut:#6a7383;--neut-bg:#e8ebf0;}
@media (prefers-color-scheme:dark){:root{--bg:#10141b;--surface:#18202a;--surface-2:#1e2732;--ink:#e8ecf2;--muted:#98a3b3;--line:#2a3542;--accent:#3fb5ad;--accent-soft:#173430;--ok:#48c78e;--ok-bg:#123526;--warn:#e0a94a;--warn-bg:#3a2e15;--bad:#e06a62;--bad-bg:#3a1f1d;--neut:#8a94a4;--neut-bg:#232c38;}}
:root[data-theme="dark"]{--bg:#10141b;--surface:#18202a;--surface-2:#1e2732;--ink:#e8ecf2;--muted:#98a3b3;--line:#2a3542;--accent:#3fb5ad;--accent-soft:#173430;--ok:#48c78e;--ok-bg:#123526;--warn:#e0a94a;--warn-bg:#3a2e15;--bad:#e06a62;--bad-bg:#3a1f1d;--neut:#8a94a4;--neut-bg:#232c38;}
:root[data-theme="light"]{--bg:#eef1f5;--surface:#fff;--surface-2:#f4f6f9;--ink:#18202e;--muted:#5c6779;--line:#d9dee7;--accent:#0f6d68;--accent-soft:#d7ebe9;--ok:#1a8a57;--ok-bg:#e0f2e8;--warn:#b5751f;--warn-bg:#f8ecd7;--bad:#bf3f38;--bad-bg:#f8e0de;--neut:#6a7383;--neut-bg:#e8ebf0;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,"Segoe UI","Arial Hebrew",Arial,sans-serif;font-size:15px;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto;padding:16px 14px 60px}
header.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
h1{font-size:22px;margin:0}
.sub{color:var(--muted);font-size:12.5px;margin-top:2px}
.hbtns{display:flex;gap:6px;flex-wrap:wrap}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:16px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.tile .n{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.tile .l{color:var(--muted);font-size:11.5px;margin-top:4px}
.tile.ok .n{color:var(--ok)}.tile.warn .n{color:var(--warn)}.tile.acc .n{color:var(--accent)}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
#q{flex:1;min-width:190px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--ink);font-size:15px}
#q:focus,input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;user-select:none}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.count{color:var(--muted);font-size:13px;margin:6px 2px 10px}
.list{display:flex;flex-direction:column;gap:8px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .12s}
.row:hover{border-color:var(--accent)}
.row .nm{font-weight:600;flex:1;min-width:0}
.row .meta{color:var(--muted);font-size:12.5px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.warn{background:var(--warn-bg);color:var(--warn)}.pill.bad{background:var(--bad-bg);color:var(--bad)}.pill.neut{background:var(--neut-bg);color:var(--neut)}
.tag{font-size:11.5px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);padding:2px 7px;border-radius:6px}
.tag.pay{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.mono{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:embed}
.ovl{position:fixed;inset:0;background:rgba(10,14,20,.55);display:none;align-items:center;justify-content:center;padding:14px;z-index:20}
.ovl.on{display:flex}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;max-height:92vh;overflow:auto;padding:20px}
.card h2{margin:0 0 2px;font-size:20px}
.field{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}
.field .k{color:var(--muted);font-size:13px}.field .v{font-weight:600;text-align:left}
.edit{margin-top:12px;display:flex;flex-direction:column;gap:7px}
label{font-size:12.5px;color:var(--muted);margin-top:4px}
input,select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px;color:var(--ink);font:inherit}
.btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 15px;font:inherit;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn.danger{background:var(--bad)}
.rowbtns{display:flex;gap:8px;justify-content:space-between;margin-top:15px;flex-wrap:wrap}
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.gate .box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px;width:320px;text-align:center}
.gate input{margin:8px 0;text-align:center}
.hide{display:none!important}
.sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.err{color:var(--bad);font-size:12.5px;min-height:15px;margin-top:6px}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div style="font-size:32px">🔐</div>
    <h2 style="margin:6px 0 2px">תיק לקוחות</h2>
    <div class="sub">התחברות</div>
    <input id="loginEmail" type="email" placeholder="אימייל" autocomplete="username">
    <input id="loginPw" type="password" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">כניסה</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="wrap hide" id="app">
  <header class="top">
    <div>
      <h1>תיק לקוחות — ביטוח משכנתא</h1>
      <div class="sync"><span class="dot" id="syncDot"></span><span id="syncTxt">טוען...</span></div>
    </div>
    <div class="hbtns">
      <button class="btn" onclick="openLead()">💡 ליד + המלצה</button>
      <button class="chip" onclick="openDoc()">📄 מסמך</button>
      <button class="btn" onclick="openAdd()">+ לקוח חדש</button>
      <button class="chip" onclick="openSettings()">⚙ הגדרות</button>
      <button class="chip" onclick="toggleTheme()">מצב תצוגה</button>
      <button class="chip" onclick="doLogout()">יציאה</button>
    </div>
  </header>
  <div class="tiles" id="tiles"></div>
  <div class="toolbar"><input id="q" placeholder="חיפוש לפי שם / טלפון / ת.ז." oninput="render()"></div>
  <div class="chips" id="statusChips" style="margin-bottom:8px"></div>
  <div class="chips" id="channelChips"></div>
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>

<div class="ovl" id="ovl" onclick="if(event.target===this)closeCard()"><div class="card" id="cardBody"></div></div>

<script>
const SB_URL="https://ktcabahjyjmtfavlsdks.supabase.co";
const SB_KEY="sb_publishable_jYj0az-JCWUc3ga1fRYcew_La1y7qVw";
const STATUSES=["נסגר בישיר","נסגר בליברה","נסגר בשוירץ","הצעה - בתהליך","עבר לישיר - לא סגר","ביטל סגירה","לזיהוי מהקלטות","לא רלוונטי","לא ידוע","נסגר"];
const CHANS=["ישיר","ליברה","שוירץ"];
const EDITABLE=[["name","שם"],["phone","טלפון"],["id_number","ת.ז."],["mortgage","סכום משכנתא"],["premium","פרמיה חודשית"],["commission_to_client","עמלה ללקוח"],["referral_source","מקור הפניה"],["notes","הערות"]];
const pillClass=s=>(s||"").startsWith("נסגר")?"ok":(s==="עבר לישיר - לא סגר"||s==="הצעה - בתהליך")?"warn":s==="ביטל סגירה"?"bad":"neut";
const fmtPhone=p=>{p=(p||"").replace(/\D/g,"");return p.length===9?"0"+p:p;};
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const val=id=>document.getElementById(id).value;
let CLIENTS=[],fStatus="הכל",fChannel="הכל";
let session=JSON.parse(localStorage.getItem("sb_session")||"null");

function chan(c){return (c.channels||"").split(",").map(s=>s.trim()).filter(Boolean);}

async function api(path,opts={}){
  opts.headers=Object.assign({"apikey":SB_KEY,"Authorization":"Bearer "+(session&&session.access_token),"Content-Type":"application/json"},opts.headers||{});
  let r=await fetch(SB_URL+path,opts);
  if(r.status===401 && session&&session.refresh_token){
    if(await refresh()){opts.headers["Authorization"]="Bearer "+session.access_token;r=await fetch(SB_URL+path,opts);}
  }
  return r;
}
async function refresh(){
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:session.refresh_token})});
  if(!r.ok){logoutLocal();return false;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email:session.email};localStorage.setItem("sb_session",JSON.stringify(session));return true;
}
async function doLogin(){
  const email=val("loginEmail").trim(),pw=val("loginPw");
  document.getElementById("loginErr").textContent="";
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
  if(!r.ok){document.getElementById("loginErr").textContent="אימייל או סיסמה שגויים";return;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email};localStorage.setItem("sb_session",JSON.stringify(session));
  startApp();
}
function logoutLocal(){session=null;localStorage.removeItem("sb_session");document.getElementById("app").classList.add("hide");document.getElementById("gate").classList.remove("hide");}
async function doLogout(){try{await fetch(SB_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+session.access_token}});}catch(e){}logoutLocal();}

async function startApp(){
  document.getElementById("gate").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  await loadClients();
  setInterval(()=>{if(!document.hidden)loadClients(true);},30000);
  window.addEventListener("focus",()=>loadClients(true));
}
async function loadClients(silent){
  if(!silent)setSync("טוען...",false);
  try{
    const r=await api("/rest/v1/clients?select=*&order=name.asc&limit=2000");
    if(!r.ok)throw 0;
    CLIENTS=await r.json();
    buildChips();render();
    setSync("מסונכרן · "+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),true);
  }catch(e){setSync("שגיאת סנכרון",false);}
}
function setSync(t,ok){document.getElementById("syncTxt").textContent=t;document.getElementById("syncDot").style.background=ok?"var(--ok)":"var(--bad)";}

function buildChips(){
  const sc=document.getElementById("statusChips");
  sc.innerHTML=["הכל",...STATUSES].map(s=>`<button class="chip" aria-pressed="${s===fStatus}" onclick="setStatus('${s}')">${s}${s==="הכל"?"":` (${CLIENTS.filter(c=>c.status===s).length})`}</button>`).join("");
  const chans=["הכל",...[...new Set(CLIENTS.flatMap(chan))]];
  document.getElementById("channelChips").innerHTML=chans.map(s=>`<button class="chip" aria-pressed="${s===fChannel}" onclick="setChannel('${s}')">${s==="הכל"?"כל הערוצים":s}</button>`).join("");
}
function setStatus(s){fStatus=s;buildChips();render();}
function setChannel(s){fChannel=s;buildChips();render();}
function tiles(){
  const a=CLIENTS,closed=a.filter(c=>c.closed||(c.status||"").startsWith("נסגר")).length,moved=a.filter(c=>c.status==="עבר לישיר - לא סגר").length,comm=a.filter(c=>c.commission_to_client).length,twice=a.filter(c=>c.closed_twice).length;
  const T=[["acc",a.length,"סה״כ לקוחות"],["ok",closed,"נסגרו"],["warn",moved,"עברו לישיר · לא סגרו"],["",twice,"נסגרו פעמיים"],["",comm,"עם עמלה"]];
  document.getElementById("tiles").innerHTML=T.map(([c,n,l])=>`<div class="tile ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
}
function render(){
  tiles();const q=document.getElementById("q").value.trim();let a=CLIENTS.slice();
  if(fStatus!=="הכל")a=a.filter(c=>c.status===fStatus);
  if(fChannel!=="הכל")a=a.filter(c=>chan(c).includes(fChannel));
  if(q)a=a.filter(c=>((c.name||"")+" "+(c.phone||"")+" "+(c.id_number||"")).includes(q));
  document.getElementById("count").textContent=`${a.length} לקוחות`;
  document.getElementById("list").innerHTML=a.map(c=>{
    const pay=c.commission_to_client?`<span class="tag pay">עמלה: ${esc(c.commission_to_client)}</span>`:"";
    const prem=c.premium?`<span class="tag">₪${esc(c.premium)}/חודש</span>`:"";
    const twice=c.closed_twice?`<span class="tag">×2 ישיר→ליברה</span>`:"";
    const calls=c.call_count?`<span class="tag">${c.call_count} שיחות</span>`:"";
    const chans=chan(c).map(x=>`<span class="tag">${esc(x)}</span>`).join("");
    return `<div class="row" onclick="openCard('${c.id}')"><span class="pill ${pillClass(c.status)}">${esc(c.status)}</span><span class="nm">${esc(c.name)}</span><span class="meta">${pay}${prem}${twice}${chans}${calls}<span class="mono">${fmtPhone(c.phone)}</span></span></div>`;
  }).join("")||`<div class="count">אין תוצאות</div>`;
}
function fld(k,v){return v?`<div class="field"><span class="k">${k}</span><span class="v">${v}</span></div>`:"";}
function openCard(id){
  const c=CLIENTS.find(x=>x.id===id);if(!c)return;
  document.getElementById("cardBody").innerHTML=`
    <h2>${esc(c.name)}</h2>
    <div class="sub" style="margin-bottom:10px"><span class="pill ${pillClass(c.status)}">${esc(c.status)}</span></div>
    ${fld("טלפון",c.phone?'<span class="mono">'+fmtPhone(c.phone)+'</span>':"")}
    ${fld("ת.ז.",esc(c.id_number))}
    ${fld("סכום משכנתא",c.mortgage?('<span class=mono>'+esc(c.mortgage)+'</span>'):"")}
    ${fld("פרמיה חודשית",c.premium?esc(c.premium)+" ₪":"")}
    ${fld("ערוצים",chan(c).join(" · "))}
    ${fld("עמלה ללקוח",esc(c.commission_to_client))}${fld("תשלום שהתקבל",esc(c.paid_to_avi))}${fld("מקור הפניה",esc(c.referral_source))}
    ${fld("נסגר פעמיים",c.closed_twice?"כן":"")}
    ${fld("סטטוס ליד בישיר",esc(c.yashir_status))}${fld("סטטוס במייל",esc(c.email_status))}
    ${fld("מס' שיחות מוקלטות",c.call_count||"")}
    ${c.call_snippet?('<div class="field"><span class="k">קטע מהשיחה</span></div><div style="font-size:13px;color:var(--muted);padding:6px 0;line-height:1.6">'+esc(c.call_snippet)+'</div>'):""}
    ${fld("הערות",esc(c.notes))}
    <div class="edit">
      ${EDITABLE.map(([f,l])=>f==="notes"?`<label>${l}</label><textarea id="ed_${f}" rows="2">${esc(c[f])}</textarea>`:`<label>${l}</label><input id="ed_${f}" value="${esc(f==="phone"?fmtPhone(c[f]):c[f])}">`).join("")}
      <label>ליד הועבר ל:</label>
      <div style="display:flex;gap:14px;padding:4px 0">${CHANS.map((ch,i)=>`<label style="font-size:14px;color:var(--ink)"><input type="checkbox" id="ch${i}" style="width:auto" ${chan(c).includes(ch)?"checked":""}> ${ch}</label>`).join("")}</div>
      <label>סטטוס</label><select id="ed_status">${STATUSES.map(s=>`<option ${s===c.status?"selected":""}>${s}</option>`).join("")}</select>
      <label>תשלום שהתקבל (₪)</label>
      <div style="display:flex;gap:6px"><input id="ed_paid_to_avi" value="${esc(c.paid_to_avi)}" style="flex:1"><button class="btn ghost" type="button" onclick="calcPay()">חשב לפי הערוץ</button></div>
    </div>
    <div class="rowbtns">
      <button class="btn danger" onclick="delClient('${c.id}')">מחק</button>
      <div style="display:flex;gap:8px"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="saveClient('${c.id}')">שמור</button></div>
    </div>`;
  document.getElementById("ovl").classList.add("on");
}
function collectEdit(){
  const o={};EDITABLE.forEach(([f])=>{o[f]=val("ed_"+f);});
  o.phone=o.phone.replace(/\D/g,"").replace(/^972/,"").replace(/^0/,"");
  o.channels=CHANS.filter((ch,i)=>document.getElementById("ch"+i).checked).join(", ");
  o.paid_to_avi=val("ed_paid_to_avi");
  o.status=val("ed_status");o.closed=(o.status||"").startsWith("נסגר");return o;
}
function calcPay(){
  const s=val("ed_status");
  const prem=parseInt((val("ed_premium")||"").replace(/\D/g,""))||0;
  const mort=parseInt((val("ed_mortgage")||"").replace(/\D/g,""))||0;
  let amt=0;
  if(s.includes("ישיר")) amt=mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  else if(s.includes("ליברה")) amt=prem>=20?300:prem>=15?200:(prem>0?100:0);
  else if(s.includes("שוירץ")) amt=prem?(prem>=75?4:3)*prem:0;
  if(amt) document.getElementById("ed_paid_to_avi").value=amt;
  else alert("בחר סטטוס 'נסגר ב[ערוץ]' והזן משכנתא/פרמיה");
}
async function saveClient(id){
  const o=collectEdit();
  const r=await api("/rest/v1/clients?id=eq."+id,{method:"PATCH",headers:{"Prefer":"return=minimal"},body:JSON.stringify(o)});
  if(!r.ok){alert("שמירה נכשלה");return;}
  closeCard();await loadClients();
}
async function delClient(id){
  if(!confirm("למחוק את הלקוח לצמיתות?"))return;
  const r=await api("/rest/v1/clients?id=eq."+id,{method:"DELETE",headers:{"Prefer":"return=minimal"}});
  if(!r.ok){alert("מחיקה נכשלה");return;}
  closeCard();await loadClients();
}
function openAdd(){
  document.getElementById("cardBody").innerHTML=`
    <h2>לקוח חדש</h2>
    <div class="edit">
      <label>שם</label><input id="ad_name">
      <label>טלפון</label><input id="ad_phone">
      <label>ת.ז.</label><input id="ad_id_number">
      <label>סכום משכנתא</label><input id="ad_mortgage">
      <label>פרמיה חודשית</label><input id="ad_premium">
      <label>ערוצים (מופרד בפסיק)</label><input id="ad_channels" placeholder="ליברה, ישיר, שוירץ">
      <label>סטטוס</label><select id="ad_status">${STATUSES.map(s=>`<option ${s==="הצעה - בתהליך"?"selected":""}>${s}</option>`).join("")}</select>
      <label>הערות</label><textarea id="ad_notes" rows="2"></textarea>
    </div>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">ביטול</button><button class="btn" onclick="addClient()">הוסף</button></div>`;
  document.getElementById("ovl").classList.add("on");
}
async function addClient(){
  const o={name:val("ad_name"),phone:val("ad_phone").replace(/\D/g,"").replace(/^972/,"").replace(/^0/,""),id_number:val("ad_id_number"),mortgage:val("ad_mortgage"),premium:val("ad_premium"),channels:val("ad_channels"),status:val("ad_status"),notes:val("ad_notes")};
  o.closed=(o.status||"").startsWith("נסגר");
  if(!o.name){alert("צריך שם");return;}

  if(!r.ok){alert("הוספה נכשלה");return;}
  closeCard();await loadClients();
}

// ---- Lead recommendation engine ----
const money=n=>(n||0).toLocaleString('he-IL');
const num=id=>parseInt((val(id)||'').replace(/\D/g,''))||0;
let _lead=null;
function openLead(){
  document.getElementById('cardBody').innerHTML=`
    <h2>💡 ליד חדש + המלצה</h2>
    <div class="edit">
      <label>שם הלקוח</label><input id="ld_name">
      <label>טלפון</label><input id="ld_phone">
      <label>ת.ז. (לישיר)</label><input id="ld_id">
      <label>סכום משכנתא (₪)</label><input id="ld_mort" inputmode="numeric">
      <label>סוג</label><select id="ld_type"><option>חדש</option><option>הסבה</option></select>
      <label>פרמיה חודשית נוכחית לביטוח חיים (₪, אם ידוע)</label><input id="ld_prem" inputmode="numeric">
      <label>גיל (אם ידוע)</label><input id="ld_age" inputmode="numeric">
      <label>ערך כינון למבנה (₪, אופציונלי)</label><input id="ld_val" inputmode="numeric">
    </div>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="computeRec()">חשב המלצה</button></div>
    <div id="recOut" style="margin-top:14px"></div>`;
  document.getElementById('ovl').classList.add('on');
}
function computeRec(){
  const name=val('ld_name'), phone=val('ld_phone').replace(/\D/g,'').replace(/^972/,'').replace(/^0/,''), idn=val('ld_id');
  const mort=num('ld_mort'), prem=num('ld_prem'), age=num('ld_age'), kval=num('ld_val');
  const isNew=val('ld_type')==='חדש';
  const yashir = mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  const libra = prem? (prem>=20?300:prem>=15?200:100) : 300;
  const schwartz = prem? (prem>=75?4:3)*prem : 0;
  const bMonthly = kval? Math.round(kval/1000*0.88/12) : 0;
  let rec, why, chans=[];
  if(isNew){
    if(mort<=1200000){ rec="ביטוח ישיר + ליברה (במקביל)"; why="ביטוח חדש עד 1.2 מ': ישיר משלם 450, אבל ליברה לרוב זול יותר ללקוח — שלח לשניהם כדי לא לפספס (מקסימום הפרש 150 ₪)."; chans=["ישיר","ליברה"]; }
    else { rec="ביטוח ישיר"; why="ביטוח חדש מעל 1.2 מ' — ישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
  } else {
    if(mort>=2000000){ rec="ביטוח ישיר"; why="הסבה מ-2 מ' ומעלה — ציון מאשר, וישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
    else if(mort>=1500000){ rec="ביטוח ישיר — דרוש אישור מציון (אחרת ליברה)"; why="הסבה 1.5–2 מ': בקש אישור מציון בטלפון/וואטסאפ. אם לא — ליברה ("+money(libra)+" ₪)."; chans=["ישיר","ליברה"]; }
    else {
      if((age>=60||prem>=200) && schwartz>libra){ rec="שוירץ"; why="הסבה, לקוח מבוגר/פרמיה גבוהה — שוירץ משלם "+money(schwartz)+" ₪ (יותר מליברה "+money(libra)+")."; chans=["שוירץ"]; }
      else { rec="ליברה"; why="הסבה מתחת ל-1.5 מ' — ישיר לא לוקח הסבות; ליברה משלם "+money(libra)+" ₪"+(schwartz?" (שוירץ: "+money(schwartz)+")":"")+"."; chans=["ליברה"]; }
    }
  }
  let rows='';
  rows+=`<div class="field"><span class="k">ביטוח ישיר</span><span class="v mono">${money(yashir)} ₪ ${(isNew||mort>=2000000)?'':(mort>=1500000?'(הסבה — אישור)':'(הסבה — לא זמין)')}</span></div>`;
  rows+=`<div class="field"><span class="k">ליברה</span><span class="v mono">${money(libra)} ₪ ${prem?'':'(משוער ≥20)'}</span></div>`;
  rows+=`<div class="field"><span class="k">שוירץ</span><span class="v mono">${schwartz?money(schwartz)+' ₪':'הזן פרמיה'}</span></div>`;
  if(bMonthly) rows+=`<div class="field"><span class="k">פרמיית מבנה (שוירץ)</span><span class="v mono">~${bMonthly} ₪/חודש</span></div>`;
  const libraDraft=`אל: danielp@lbr.co.il\nנושא: ${name}\n\n${phone?'0'+phone:''} ${isNew?'משכנתא חדשה על סך':'ייתרה'} ${money(mort)}`;
  const yashirDoc=`שם: ${name}\nת.ז.: ${idn}\nטלפון: ${phone?'0'+phone:''}\nסכום משכנתא: ${money(mort)} ₪`;
  _lead={name,phone,idn,mort,chans:chans.join(", ")};
  document.getElementById('recOut').innerHTML=`
    <div style="background:var(--accent-soft);border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="font-weight:700;color:var(--accent);font-size:16px">➡ ${esc(rec)}</div>
      <div style="font-size:13px;margin-top:5px">${esc(why)}</div>
    </div>
    ${rows}
    <label style="margin-top:10px">טיוטת מייל לליברה (לחץ להעתקה)</label><textarea rows="4" onclick="this.select()">${esc(libraDraft)}</textarea>
    <label>מסמך לישיר (לחץ להעתקה)</label><textarea rows="4" onclick="this.select()">${esc(yashirDoc)}</textarea>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="saveLead()">שמור כלקוח</button></div>`;
}
async function saveLead(){
  if(!_lead||!_lead.name){alert('צריך שם');return;}
  const o={name:_lead.name,phone:_lead.phone||null,id_number:_lead.idn||null,
    mortgage:_lead.mort?String(_lead.mort):null,status:'הצעה - בתהליך',channels:_lead.chans,notes:'ליד חדש (ממנוע ההמלצה)'};
  const r=await api('/rest/v1/clients',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(o)});
  if(!r.ok){alert('שמירה נכשלה');return;}
  closeCard();await loadClients();
}

const CO={"ליברה":'ליברה חברה לביטוח בע"מ',"ביטוח ישיר":'איי.די.איי חברה לביטוח בע"מ'};
let _docItems=[];
function openDoc(){ _docItems=[{name:"",amt:""}]; renderDoc(); document.getElementById('ovl').classList.add('on'); }

function renderItems(){
  const el=document.getElementById('dc_items'); if(!el)return;
  el.innerHTML=_docItems.map((it,i)=>`<div style="display:flex;gap:6px;margin-bottom:5px">
    <input placeholder="שם" value="${esc(it.name)}" oninput="_docItems[${i}].name=this.value" style="flex:2">

function addDocItem(){_docItems.push({name:"",amt:""});renderItems();}
function genDoc(){
  const type=(window._docType||'קבלה');
  const hdr=`מאת: ${BIZ.name} · עוסק פטור ${BIZ.patur} · טל' ${BIZ.tel} · ${BIZ.email}`;
  let html;
  if(type==='קבלה'){
    const co=CO[val('dc_co')], date=val('dc_date'), amt=num('dc_amt'), note=val('dc_note');
    html=`<div class="doc"><h3>קבלה (מקור)</h3><div class="hdr">${hdr}<br>עבור: ${co}</div>
      <table><tr><th>אמצעי תשלום</th><th>תאריך</th><th>סכום</th></tr>
      <tr><td>העברה בנקאית</td><td>${esc(date)}</td><td>₪ ${money(amt)}</td></tr></table>
      <div class="tot">סה"כ: ₪ ${money(amt)}</div><div style="margin-top:6px">הערות: עבור ${esc(note)}</div></div>`;
  } else {
    let total=0, rows='';
    _docItems.forEach(it=>{const a=parseInt((it.amt||'').replace(/\D/g,''))||0;total+=a;
      rows+=`<tr><td>${esc(it.name)}</td><td>${esc(it.desc||'')}</td><td>₪ ${money(a)}</td></tr>`;});
    html=`<div class="doc"><h3>חשבון עסקה (מקור)</h3><div class="hdr">${hdr}<br>עבור: ליברה חברה לביטוח בע"מ</div>
      <table><tr><th>שם</th><th>תיאור</th><th>סכום</th></tr>${rows}</table>
      <div class="tot">סה"כ פטור ממע"מ: ₪ ${money(total)} &nbsp;·&nbsp; סה"כ לתשלום: ₪ ${money(total)}</div></div>`;
  }
  window._docHtml=html;
  document.getElementById('docPrev').innerHTML=`<div style="border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff;color:#111">${html}</div>
    <div class="rowbtns"><button class="btn" onclick="printDoc()">🖨 הדפס / שמור PDF</button></div>`;
}
function printDoc(){
  const w=window.open('','_blank');
  w.document.write('<html dir="rtl" lang="he"><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;color:#111;padding:24px}.doc{max-width:620px;margin:0 auto}.doc h3{text-align:center}.doc .hdr{font-size:12px;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:12px;line-height:1.7}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #888;padding:6px;text-align:right}.tot{font-weight:700;margin-top:10px;text-align:left}</style></head><body>'+window._docHtml+'</body></html>');
  w.document.close();w.focus();setTimeout(()=>w.print(),300);
}
