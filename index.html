<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>תיק לקוחות — ביטוח משכנתא</title>
<style>
:root{--bg:#eef1f5;--surface:#fff;--surface-2:#f4f6f9;--ink:#18202e;--muted:#5c6779;--line:#d9dee7;--accent:#0f6d68;--accent-soft:#d7ebe9;--ok:#1a8a57;--ok-bg:#e0f2e8;--warn:#b5751f;--warn-bg:#f8ecd7;--bad:#bf3f38;--bad-bg:#f8e0de;--neut:#6a7383;--neut-bg:#e8ebf0;}
@media (prefers-color-scheme:dark){:root{--bg:#10141b;--surface:#18202a;--surface-2:#1e2732;--ink:#e8ecf2;--muted:#98a3b3;--line:#2a3542;--accent:#3fb5ad;--accent-soft:#173430;--ok:#48c78e;--ok-bg:#123526;--warn:#e0a94a;--warn-bg:#3a2e15;--bad:#e06a62;--bad-bg:#3a1f1d;--neut:#8a94a4;--neut-bg:#232c38;}}
:root[data-theme="dark"]{--bg:#10141b;--surface:#18202a;--surface-2:#1e2732;--ink:#e8ecf2;--muted:#98a3b3;--line:#2a3542;--accent:#3fb5ad;--accent-soft:#173430;--ok:#48c78e;--ok-bg:#123526;--warn:#e0a94a;--warn-bg:#3a2e15;--bad:#e06a62;--bad-bg:#3a1f1d;--neut:#8a94a4;--neut-bg:#232c38;}
:root[data-theme="light"]{--bg:#eef1f5;--surface:#fff;--surface-2:#f4f6f9;--ink:#18202e;--muted:#5c6779;--line:#d9dee7;--accent:#0f6d68;--accent-soft:#d7ebe9;--ok:#1a8a57;--ok-bg:#e0f2e8;--warn:#b5751f;--warn-bg:#f8ecd7;--bad:#bf3f38;--bad-bg:#f8e0de;--neut:#6a7383;--neut-bg:#e8ebf0;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,"Segoe UI","Arial Hebrew",Arial,sans-serif;font-size:15px;line-height:1.5}
/* ---- top app bar ---- */
.appbar{position:sticky;top:0;z-index:15;background:var(--surface);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.appbar-in{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:0 18px;height:56px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;white-space:nowrap}
.brand .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav{display:flex;gap:2px;height:100%;flex:1}
.nav button{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:14px;padding:0 14px;height:100%;cursor:pointer;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:6px}
.nav button:hover{color:var(--ink)}
.nav button[aria-selected="true"]{color:var(--accent);border-bottom-color:var(--accent)}
.appbar .acts{display:flex;align-items:center;gap:6px}
.sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.wrap{max-width:1180px;margin:0 auto;padding:18px 18px 60px}
h1{font-size:22px;margin:0}
.sub{color:var(--muted);font-size:12.5px;margin-top:2px}
/* ---- stat strip ---- */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.tile::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--neut)}
.tile.ok::before{background:var(--ok)}.tile.warn::before{background:var(--warn)}.tile.acc::before{background:var(--accent)}
.tile .n{font-size:27px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.tile .l{color:var(--muted);font-size:12px;margin-top:5px}
.tile.ok .n{color:var(--ok)}.tile.warn .n{color:var(--warn)}.tile.acc .n{color:var(--accent)}
/* ---- section panel ---- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
#q{flex:1;min-width:200px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--ink);font-size:14.5px}
select.flt{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 12px;color:var(--ink);font:inherit;font-size:14px;cursor:pointer;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:left 13px center,left 8px center;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px}
.count{color:var(--muted);font-size:12.5px;margin-inline-start:auto;white-space:nowrap}
/* ---- data table ---- */
.tbl-scroll{overflow-x:auto}
table.data{width:100%;border-collapse:collapse;font-size:14px}
table.data th{position:sticky;top:56px;background:var(--surface-2);color:var(--muted);font-weight:600;font-size:12.5px;text-align:right;padding:10px 14px;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
table.data th:hover{color:var(--ink)}
table.data th .ar{opacity:.5;font-size:10px;margin-inline-start:3px}
table.data th.active{color:var(--accent)}
table.data td{padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
table.data tbody tr{cursor:pointer;transition:background .1s}
table.data tbody tr:hover{background:var(--surface-2)}
table.data tbody tr:last-child td{border-bottom:none}
td .nm{font-weight:600}
.empty{padding:40px;text-align:center;color:var(--muted)}
/* ---- breakdown (overview tab) ---- */
.brk{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.brk .box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px}
.brk h3{margin:0 0 12px;font-size:15px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13.5px}
.brow .lbl{width:150px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .bar{flex:1;height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden}
.brow .bar span{display:block;height:100%;background:var(--accent);border-radius:5px}
.brow .v{width:34px;text-align:left;font-variant-numeric:tabular-nums;font-weight:600}
.pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;display:inline-block}
.pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.warn{background:var(--warn-bg);color:var(--warn)}.pill.bad{background:var(--bad-bg);color:var(--bad)}.pill.neut{background:var(--neut-bg);color:var(--neut)}
.tag{font-size:11.5px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);padding:2px 7px;border-radius:6px}
.tag.pay{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.mono{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:embed}
@media(max-width:640px){.appbar-in{padding:0 12px;gap:10px}.nav button{padding:0 10px}.brand span{display:none}.wrap{padding:14px 12px 60px}}
.ovl{position:fixed;inset:0;background:rgba(10,14,20,.55);display:none;align-items:center;justify-content:center;padding:14px;z-index:20}
.ovl.on{display:flex}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;max-height:92vh;overflow:auto;padding:20px}
.card h2{margin:0 0 2px;font-size:20px}
.field{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}
.field .k{color:var(--muted);font-size:13px}.field .v{font-weight:600;text-align:left}
.edit{margin-top:12px;display:flex;flex-direction:column;gap:7px}
label{font-size:12.5px;color:var(--muted);margin-top:4px}
input,select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px;color:var(--ink);font:inherit}
.btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 15px;font:inherit;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn.danger{background:var(--bad)}
.btn.sm{padding:7px 13px;font-size:13.5px;border-radius:8px}
.abtn{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center}
.abtn:hover{border-color:var(--accent);color:var(--accent)}
.iconbtn{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);width:38px;height:38px;min-width:38px;border-radius:11px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex:none}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}
.rowbtns{display:flex;gap:8px;justify-content:space-between;margin-top:15px;flex-wrap:wrap}
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.gate .box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px;width:320px;text-align:center}
.gate input{margin:8px 0;text-align:center}
.hide{display:none!important}
.sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.err{color:var(--bad);font-size:12.5px;min-height:15px;margin-top:6px}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div style="font-size:32px">🔐</div>
    <h2 style="margin:6px 0 2px">תיק לקוחות</h2>
    <div class="sub">התחברות</div>
    <input id="loginEmail" type="email" placeholder="אימייל" autocomplete="username">
    <input id="loginPw" type="password" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">כניסה</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="hide" id="app">
  <div class="appbar">
    <div class="appbar-in">
      <div class="brand"><span class="logo">🏠</span><span>תיק לקוחות</span></div>
      <nav class="nav" id="nav">
        <button aria-selected="true" onclick="setTab('clients')">📋 לקוחות</button>
        <button aria-selected="false" onclick="setTab('overview')">📊 סקירה</button>
      </nav>
      <div class="acts">
        <div class="sync"><span class="dot" id="syncDot"></span><span id="syncTxt">טוען...</span></div>
        <button class="btn sm" onclick="openLead()">＋ ליד חדש</button>
        <button class="abtn" onclick="openDoc()" title="הפקת מסמך">📄</button>
        <button class="abtn" onclick="openSettings()" title="הגדרות">⚙</button>
        <button class="abtn" onclick="toggleTheme()" title="מצב תצוגה">◐</button>
        <button class="abtn" onclick="doLogout()" title="יציאה">⎋</button>
      </div>
    </div>
  </div>
  <div class="wrap">
    <div class="tiles" id="tiles"></div>
    <div id="tab-clients">
      <div class="panel">
        <div class="toolbar">
          <input id="q" placeholder="🔍 חיפוש לפי שם / טלפון / ת.ז." oninput="render()">
          <select class="flt" id="fStatus" onchange="fStatus=this.value;render()"></select>
          <select class="flt" id="fChannel" onchange="fChannel=this.value;render()"></select>
          <span class="count" id="count"></span>
        </div>
        <div class="tbl-scroll"><table class="data" id="tbl"></table></div>
      </div>
    </div>
    <div id="tab-overview" class="hide"><div class="brk" id="brk"></div></div>
  </div>
</div>

<div class="ovl" id="ovl" onclick="if(event.target===this)closeCard()"><div class="card" id="cardBody"></div></div>

<script>
const SB_URL="https://ktcabahjyjmtfavlsdks.supabase.co";
const SB_KEY="sb_publishable_jYj0az-JCWUc3ga1fRYcew_La1y7qVw";
const STATUSES=["ממתין לשליחת ליד","הצעה בתהליך - ליברה","הצעה בתהליך - ישיר","הצעה בתהליך - שוירץ","נסגר בליברה","נסגר בישיר","נסגר בשוירץ","ביטל סגירה","לזיהוי מהקלטות","לא רלוונטי","לא ידוע","נסגר"];
const CHANS=["ישיר","ליברה","שוירץ"];
const EDITABLE=[["name","שם"],["phone","טלפון"],["id_number","ת.ז."],["mortgage","סכום משכנתא"],["premium","פרמיה חודשית"],["commission_to_client","עמלה ללקוח"],["referral_source","מקור הפניה"],["notes","הערות"]];
const pillClass=s=>(s||"").startsWith("נסגר")?"ok":(s||"").startsWith("הצעה")?"warn":s==="ביטל סגירה"?"bad":"neut";
const fmtPhone=p=>{p=(p||"").replace(/\D/g,"");return p.length===9?"0"+p:p;};
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const val=id=>document.getElementById(id).value;
let CLIENTS=[],fStatus="הכל",fChannel="הכל",sortKey="name",sortDir=1,activeTab="clients";
const COLS=[
  {k:"name",l:"שם",t:"txt"},
  {k:"phone",l:"טלפון",t:"phone"},
  {k:"status",l:"סטטוס",t:"status"},
  {k:"channels",l:"ליד הועבר ל",t:"txt"},
  {k:"mortgage",l:"משכנתא",t:"num"},
  {k:"premium",l:"פרמיה",t:"num"},
  {k:"commission_to_client",l:"עמלה ללקוח",t:"num"},
  {k:"paid_to_avi",l:"התקבל",t:"num"},
];
let session=JSON.parse(localStorage.getItem("sb_session")||"null");

function chan(c){return (c.channels||"").split(",").map(s=>s.trim()).filter(Boolean);}

async function api(path,opts={}){
  opts.headers=Object.assign({"apikey":SB_KEY,"Authorization":"Bearer "+(session&&session.access_token),"Content-Type":"application/json"},opts.headers||{});
  let r=await fetch(SB_URL+path,opts);
  if(r.status===401 && session&&session.refresh_token){
    if(await refresh()){opts.headers["Authorization"]="Bearer "+session.access_token;r=await fetch(SB_URL+path,opts);}
  }
  return r;
}
async function refresh(){
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:session.refresh_token})});
  if(!r.ok){logoutLocal();return false;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email:session.email};localStorage.setItem("sb_session",JSON.stringify(session));return true;
}
async function doLogin(){
  const email=val("loginEmail").trim(),pw=val("loginPw");
  document.getElementById("loginErr").textContent="";
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
  if(!r.ok){document.getElementById("loginErr").textContent="אימייל או סיסמה שגויים";return;}
  const d=await r.json();session={access_token:d.access_token,refresh_token:d.refresh_token,email};localStorage.setItem("sb_session",JSON.stringify(session));
  startApp();
}
function logoutLocal(){session=null;localStorage.removeItem("sb_session");document.getElementById("app").classList.add("hide");document.getElementById("gate").classList.remove("hide");}
async function doLogout(){try{await fetch(SB_URL+"/auth/v1/logout",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+session.access_token}});}catch(e){}logoutLocal();}

async function startApp(){
  document.getElementById("gate").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  await loadClients();
  setInterval(()=>{if(!document.hidden)loadClients(true);},30000);
  window.addEventListener("focus",()=>loadClients(true));
}
async function loadClients(silent){
  if(!silent)setSync("טוען...",false);
  try{
    const r=await api("/rest/v1/clients?select=*&order=name.asc&limit=2000");
    if(!r.ok)throw 0;
    CLIENTS=await r.json();
    buildChips();render();
    setSync("מסונכרן · "+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),true);
  }catch(e){setSync("שגיאת סנכרון",false);}
}
function setSync(t,ok){document.getElementById("syncTxt").textContent=t;document.getElementById("syncDot").style.background=ok?"var(--ok)":"var(--bad)";}

const normd=s=>(s||"").replace(/\D/g,"").replace(/^972/,"").replace(/^0/,"");
function buildChips(){populateFilters();}
function populateFilters(){
  const fs=document.getElementById("fStatus");
  fs.innerHTML=[["הכל","כל הסטטוסים"],...STATUSES.map(s=>[s,`${s} (${CLIENTS.filter(c=>c.status===s).length})`])]
    .map(([v,l])=>`<option value="${esc(v)}" ${v===fStatus?"selected":""}>${esc(l)}</option>`).join("");
  const chans=[...new Set(CLIENTS.flatMap(chan))];
  const fc=document.getElementById("fChannel");
  fc.innerHTML=[["הכל","כל הערוצים"],...chans.map(s=>[s,`${s} (${CLIENTS.filter(c=>chan(c).includes(s)).length})`])]
    .map(([v,l])=>`<option value="${esc(v)}" ${v===fChannel?"selected":""}>${esc(l)}</option>`).join("");
}
function setTab(t){
  activeTab=t;
  document.querySelectorAll("#nav button").forEach((b,i)=>b.setAttribute("aria-selected", (i===0?"clients":"overview")===t));
  document.getElementById("tab-clients").classList.toggle("hide",t!=="clients");
  document.getElementById("tab-overview").classList.toggle("hide",t!=="overview");
  render();
}
function sortBy(k){ if(sortKey===k)sortDir=-sortDir; else{sortKey=k;sortDir=1;} render(); }
function cmp(a,b){
  const col=COLS.find(c=>c.k===sortKey)||COLS[0];
  if(col.t==="num"){const x=parseInt(String(a[sortKey]||"").replace(/\D/g,""))||0,y=parseInt(String(b[sortKey]||"").replace(/\D/g,""))||0;return (x-y)*sortDir;}
  if(col.t==="status"){return (STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status))*sortDir;}
  if(col.t==="phone"){const x=normd(a.phone),y=normd(b.phone);return (x<y?-1:x>y?1:0)*sortDir;}
  return String(a[sortKey]||"").localeCompare(String(b[sortKey]||""),"he")*sortDir;
}
function filtered(){
  const q=document.getElementById("q").value.trim();let a=CLIENTS.slice();
  if(fStatus!=="הכל")a=a.filter(c=>c.status===fStatus);
  if(fChannel!=="הכל")a=a.filter(c=>chan(c).includes(fChannel));
  if(q){const qd=normd(q);a=a.filter(c=>{if((c.name||"").includes(q))return true;if(!qd)return false;return normd(c.phone).includes(qd)||normd(c.id_number).includes(qd);});}
  return a.sort(cmp);
}
function tiles(){
  const a=CLIENTS,closed=a.filter(c=>c.closed||(c.status||"").startsWith("נסגר")).length,inproc=a.filter(c=>(c.status||"").startsWith("הצעה")).length,waiting=a.filter(c=>c.status==="ממתין לשליחת ליד").length;
  const paid=a.reduce((s,c)=>s+(parseInt(String(c.paid_to_avi||"").replace(/\D/g,""))||0),0);
  const T=[["acc",a.length,"סה״כ לקוחות"],["ok",closed,"נסגרו"],["warn",inproc,"בהצעה / בתהליך"],["",waiting,"ממתין לשליחה"],["",money(paid)+" ₪","סה״כ התקבל"]];
  document.getElementById("tiles").innerHTML=T.map(([c,n,l])=>`<div class="tile ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
}
function cell(c,k){
  if(k==="name")return `<span class="nm">${esc(c.name)}</span>`;
  if(k==="phone")return c.phone?`<span class="mono">${fmtPhone(c.phone)}</span>`:"";
  if(k==="status")return `<span class="pill ${pillClass(c.status)}">${esc(c.status)}</span>`;
  if(k==="channels")return chan(c).length?chan(c).map(x=>`<span class="tag">${esc(x)}</span>`).join(" "):"<span style='color:var(--muted)'>—</span>";
  if(k==="mortgage")return c.mortgage?`<span class="mono">${money(parseInt(String(c.mortgage).replace(/\D/g,""))||0)} ₪</span>`:"";
  if(k==="premium")return c.premium?`<span class="mono">${esc(c.premium)} ₪</span>`:"";
  if(k==="commission_to_client")return c.commission_to_client?`<span class="tag pay">${esc(c.commission_to_client)} ₪</span>`:"";
  if(k==="paid_to_avi")return c.paid_to_avi?`<span class="mono">${esc(c.paid_to_avi)} ₪</span>`:"";
  return "";
}
function render(){
  tiles();populateFilters();
  if(activeTab==="overview"){renderOverview();return;}
  const a=filtered();
  document.getElementById("count").textContent=`${a.length} לקוחות`;

function renderOverview(){
  const byStatus=STATUSES.map(s=>[s,CLIENTS.filter(c=>c.status===s).length]).filter(x=>x[1]);
  const chans=[...new Set(CLIENTS.flatMap(chan))];
  const byChan=chans.map(s=>[s,CLIENTS.filter(c=>chan(c).includes(s)).length]).sort((a,b)=>b[1]-a[1]);
  const byRef=[...new Set(CLIENTS.map(c=>c.referral_source).filter(Boolean))].map(s=>[s,CLIENTS.filter(c=>c.referral_source===s).length]).sort((a,b)=>b[1]-a[1]);
  const mx=arr=>Math.max(1,...arr.map(x=>x[1]));
  const bars=(arr,cls)=>{const m=mx(arr);return arr.map(([l,n])=>`<div class="brow"><span class="lbl">${esc(l)}</span><span class="bar"><span style="width:${Math.round(n/m*100)}%${cls?';background:'+cls:''}"></span></span><span class="v">${n}</span></div>`).join("")||`<div style="color:var(--muted);font-size:13px">אין נתונים</div>`;}

function calcPay(){
  const s=val("ed_status");
  const prem=parseInt((val("ed_premium")||"").replace(/\D/g,""))||0;
  const mort=parseInt((val("ed_mortgage")||"").replace(/\D/g,""))||0;
  let amt=0;
  if(s.includes("ישיר")) amt=mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  else if(s.includes("ליברה")) amt=prem>=20?300:prem>=15?200:(prem>0?100:0);
  else if(s.includes("שוירץ")) amt=prem?(prem>=75?4:3)*prem:0;
  if(amt) document.getElementById("ed_paid_to_avi").value=amt;
  else alert("בחר סטטוס 'נסגר ב[ערוץ]' והזן משכנתא/פרמיה");
}

function computeRec(){
  const name=val('ld_name'), phone=val('ld_phone').replace(/\D/g,'').replace(/^972/,'').replace(/^0/,''), idn=val('ld_id');
  const mort=num('ld_mort'), prem=num('ld_prem'), age=num('ld_age'), kval=num('ld_val');
  const isNew=val('ld_type')==='חדש';
  const yashir = mort>=2000000?1000:mort>=1500000?700:mort>=1200000?550:450;
  const libra = prem? (prem>=20?300:prem>=15?200:100) : 300;
  const schwartz = prem? (prem>=75?4:3)*prem : 0;
  const bMonthly = kval? Math.round(kval/1000*0.88/12) : 0;
  let rec, why, chans=[];
  if(isNew){
    if(mort<=1200000){ rec="ביטוח ישיר + ליברה (במקביל)"; why="ביטוח חדש עד 1.2 מ': ישיר משלם 450, אבל ליברה לרוב זול יותר ללקוח — שלח לשניהם כדי לא לפספס (מקסימום הפרש 150 ₪)."; chans=["ישיר","ליברה"]; }
    else { rec="ביטוח ישיר"; why="ביטוח חדש מעל 1.2 מ' — ישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
  } else {
    if(mort>=2000000){ rec="ביטוח ישיר"; why="הסבה מ-2 מ' ומעלה — ציון מאשר, וישיר משלם הכי הרבה ("+money(yashir)+" ₪)."; chans=["ישיר"]; }
    else if(mort>=1500000){ rec="ביטוח ישיר — דרוש אישור מציון (אחרת ליברה)"; why="הסבה 1.5–2 מ': בקש אישור מציון בטלפון/וואטסאפ. אם לא — ליברה ("+money(libra)+" ₪)."; chans=["ישיר","ליברה"]; }
    else {
      if((age>=60||prem>=200) && schwartz>libra){ rec="שוירץ"; why="הסבה, לקוח מבוגר/פרמיה גבוהה — שוירץ משלם "+money(schwartz)+" ₪ (יותר מליברה "+money(libra)+")."; chans=["שוירץ"]; }
      else { rec="ליברה"; why="הסבה מתחת ל-1.5 מ' — ישיר לא לוקח הסבות; ליברה משלם "+money(libra)+" ₪"+(schwartz?" (שוירץ: "+money(schwartz)+")":"")+"."; chans=["ליברה"]; }
    }
  }
  let rows='';
  rows+=`<div class="field"><span class="k">ביטוח ישיר</span><span class="v mono">${money(yashir)} ₪ ${(isNew||mort>=2000000)?'':(mort>=1500000?'(הסבה — אישור)':'(הסבה — לא זמין)')}</span></div>`;
  rows+=`<div class="field"><span class="k">ליברה</span><span class="v mono">${money(libra)} ₪ ${prem?'':'(משוער ≥20)'}</span></div>`;
  rows+=`<div class="field"><span class="k">שוירץ</span><span class="v mono">${schwartz?money(schwartz)+' ₪':'הזן פרמיה'}</span></div>`;
  if(bMonthly) rows+=`<div class="field"><span class="k">פרמיית מבנה (שוירץ)</span><span class="v mono">~${bMonthly} ₪/חודש</span></div>`;
  const libraDraft=`אל: danielp@lbr.co.il\nנושא: ${name}\n\n${phone?'0'+phone:''} ${isNew?'משכנתא חדשה על סך':'ייתרה'} ${money(mort)}`;
  const yashirDoc=`שם: ${name}\nת.ז.: ${idn}\nטלפון: ${phone?'0'+phone:''}\nסכום משכנתא: ${money(mort)} ₪`;
  _lead={name,phone,idn,mort,chans:chans.join(", ")};
  document.getElementById('recOut').innerHTML=`
    <div style="background:var(--accent-soft);border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="font-weight:700;color:var(--accent);font-size:16px">➡ ${esc(rec)}</div>
      <div style="font-size:13px;margin-top:5px">${esc(why)}</div>
    </div>
    ${rows}
    <label style="margin-top:10px">טיוטת מייל לליברה (לחץ להעתקה)</label><textarea rows="4" onclick="this.select()">${esc(libraDraft)}</textarea>
    <label>מסמך לישיר (לחץ להעתקה)</label><textarea rows="4" onclick="this.select()">${esc(yashirDoc)}</textarea>
    <div class="rowbtns"><button class="btn ghost" onclick="closeCard()">סגור</button><button class="btn" onclick="saveLead()">שמור כלקוח</button></div>`;
}
